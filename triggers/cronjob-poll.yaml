apiVersion: batch/v1
kind: CronJob
metadata:
  name: poll-source-repo
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: pipeline
          restartPolicy: Never
          containers:
            - name: poll
              image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
              env:
                - name: GITHUB_OWNER
                  value: "loop9x"
                - name: GITHUB_REPO
                  value: "smart-log-analyzer"
                - name: BRANCH
                  value: "main"
                - name: REPO_URL
                  value: "https://github.com/loop9x/smart-log-analyzer.git"
                - name: APP_ROOT
                  value: ""
                - name: RUNTIME
                  value: "spring-boot"
                - name: CAMEL_IMAGE
                  value: "quay.io/mcarlett/camel-launcher:4.18.0"
                - name: CONFIG_REPO_URL
                  value: "https://github.com/mcarlett/smart-log-analyzer-ocp.git"
                - name: CONFIG_REPO_REVISION
                  value: "gitops"
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
                  API="https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}"

                  # Build path prefix from APP_ROOT (e.g. "smart-log-analyzer/" or "")
                  if [ -n "${APP_ROOT}" ]; then
                    PATH_PREFIX="${APP_ROOT}/"
                  else
                    PATH_PREFIX=""
                  fi

                  # Check if any application deployments are missing
                  DEPLOY_MISSING=false
                  for app in correlator analyzer ui-console; do
                    if ! oc get deployment "${app}" -n "${NS}" &>/dev/null; then
                      echo "Deployment '${app}' not found."
                      DEPLOY_MISSING=true
                    fi
                  done

                  # Get the last known commit from the ConfigMap (or empty if first run)
                  LAST_SHA=$(oc get configmap source-repo-state -n "${NS}" -o jsonpath='{.data.last-commit}' 2>/dev/null || echo "")

                  # Get the current HEAD from GitHub API
                  CURRENT_SHA=$(curl -sf "${API}/commits/${BRANCH}" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")

                  echo "Last known commit: ${LAST_SHA:-<first run>}"
                  echo "Current HEAD:      ${CURRENT_SHA}"

                  # Determine which components need building
                  BUILD_CORRELATOR=false
                  BUILD_ANALYZER=false
                  BUILD_UI_CONSOLE=false

                  if [ "${DEPLOY_MISSING}" = "true" ]; then
                    echo "Deployments missing — building all components."
                    BUILD_CORRELATOR=true
                    BUILD_ANALYZER=true
                    BUILD_UI_CONSOLE=true
                  elif [ "${LAST_SHA}" = "${CURRENT_SHA}" ]; then
                    echo "No new commits. Nothing to do."
                    exit 0
                  else
                    echo "Fetching diff ${LAST_SHA}...${CURRENT_SHA}..."
                    CHANGED_FILES=$(curl -sf "${API}/compare/${LAST_SHA}...${CURRENT_SHA}" | python3 -c "
                    import sys, json
                    data = json.load(sys.stdin)
                    for f in data.get('files', []):
                        print(f['filename'])
                    ")

                    echo "Changed files:"
                    echo "${CHANGED_FILES}"

                    echo "${CHANGED_FILES}" | grep -q "^${PATH_PREFIX}correlator/" && BUILD_CORRELATOR=true || true
                    echo "${CHANGED_FILES}" | grep -q "^${PATH_PREFIX}analyzer/" && BUILD_ANALYZER=true || true
                    echo "${CHANGED_FILES}" | grep -q "^${PATH_PREFIX}ui-console/" && BUILD_UI_CONSOLE=true || true
                  fi

                  echo ""
                  echo "Components to build: correlator=${BUILD_CORRELATOR} analyzer=${BUILD_ANALYZER} ui-console=${BUILD_UI_CONSOLE}"

                  if [ "${BUILD_CORRELATOR}" = "false" ] && [ "${BUILD_ANALYZER}" = "false" ] && [ "${BUILD_UI_CONSOLE}" = "false" ]; then
                    echo "No smart-log-analyzer components changed."
                    oc create configmap source-repo-state --from-literal=last-commit="${CURRENT_SHA}" -n "${NS}" --dry-run=client -o yaml | oc apply -n "${NS}" -f -
                    exit 0
                  fi

                  # Helper function to create a PipelineRun
                  create_pipeline_run() {
                    local APP_NAME="$1"
                    local APP_PATH="$2"
                    local GAV="$3"
                    local EXTRA_PARAMS="${4:-}"

                    echo "Creating PipelineRun for ${APP_NAME}..."
                    cat <<PEOF | oc create -f -
                  apiVersion: tekton.dev/v1
                  kind: PipelineRun
                  metadata:
                    generateName: build-${APP_NAME}-
                    namespace: ${NS}
                  spec:
                    pipelineRef:
                      name: build
                    params:
                      - name: repo-url
                        value: "${REPO_URL}"
                      - name: repo-revision
                        value: "${CURRENT_SHA}"
                      - name: app-path
                        value: "${APP_PATH}"
                      - name: app-name
                        value: "${APP_NAME}"
                      - name: namespace
                        value: "${NS}"
                      - name: camel-image
                        value: "${CAMEL_IMAGE}"
                      - name: gav
                        value: "${GAV}"
                      - name: runtime
                        value: "${RUNTIME}"
                  ${EXTRA_PARAMS}
                    workspaces:
                      - name: shared-workspace
                        volumeClaimTemplate:
                          spec:
                            accessModes:
                              - ReadWriteOnce
                            resources:
                              requests:
                                storage: 1Gi
                  PEOF
                  }

                  if [ "${BUILD_CORRELATOR}" = "true" ]; then
                    create_pipeline_run "correlator" "${PATH_PREFIX}correlator" "com.example:correlator:1.0.0"
                  fi

                  if [ "${BUILD_ANALYZER}" = "true" ]; then
                    create_pipeline_run "analyzer" "${PATH_PREFIX}analyzer" "com.example:analyzer:1.0.0"
                  fi

                  if [ "${BUILD_UI_CONSOLE}" = "true" ]; then
                    UI_EXTRA='                      - name: extensions
                        value: "org.apache.camel.quarkus:camel-quarkus-platform-http"'
                    create_pipeline_run "ui-console" "${PATH_PREFIX}ui-console" "com.example:ui-console:1.0.0" "${UI_EXTRA}"
                  fi

                  # Deploy applications via ArgoCD if deployments are missing
                  if [ "${DEPLOY_MISSING}" = "true" ]; then
                    echo "Waiting for build PipelineRuns to complete..."
                    for app in correlator analyzer ui-console; do
                      PR=$(oc get pipelinerun -n "${NS}" -l tekton.dev/pipeline=build \
                        --sort-by=.metadata.creationTimestamp -o name 2>/dev/null \
                        | grep "build-${app}" | tail -1)
                      if [ -n "${PR}" ]; then
                        echo "Waiting for ${PR}..."
                        oc wait "${PR}" -n "${NS}" --for=condition=Succeeded --timeout=600s || true
                      fi
                    done

                    echo "Applying ArgoCD Application to deploy via Helm chart..."
                    cat <<ARGOEOF | oc apply -f -
                  apiVersion: argoproj.io/v1alpha1
                  kind: Application
                  metadata:
                    name: smart-log-analyzer
                    namespace: openshift-gitops
                  spec:
                    project: default
                    source:
                      repoURL: "${CONFIG_REPO_URL}"
                      targetRevision: "${CONFIG_REPO_REVISION}"
                      path: helm/smart-log-analyzer
                      helm:
                        valueFiles:
                          - values-${RUNTIME}.yaml
                    destination:
                      server: https://kubernetes.default.svc
                      namespace: ${NS}
                    syncPolicy:
                      automated:
                        prune: false
                        selfHeal: false
                  ARGOEOF
                    echo "ArgoCD Application applied. Deployments will be created by ArgoCD sync."
                  fi

                  # Update the state ConfigMap
                  oc create configmap source-repo-state --from-literal=last-commit="${CURRENT_SHA}" -n "${NS}" --dry-run=client -o yaml | oc apply -n "${NS}" -f -

                  echo "Done. PipelineRuns created for changed components."
