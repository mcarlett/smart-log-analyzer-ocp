apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: deploy-log-generator
spec:
  params:
    - name: repo-url
      type: string
      default: "https://github.com/apache/camel-jbang-examples.git"
    - name: repo-revision
      type: string
      default: main
    - name: namespace
      type: string
      default: slog-analyzer
    - name: otel-collector-endpoint
      type: string
      default: "http://camel-otel-collector-opentelemetry-collector.slog-analyzer.svc:4317"
  workspaces:
    - name: shared-workspace

  tasks:
    - name: init-workspace
      taskRef:
        name: init-workspace
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: git-clone
      runAfter:
        - init-workspace
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.repo-url)
        - name: REVISION
          value: $(params.repo-revision)
        - name: DELETE_EXISTING
          value: "true"
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: copy-dockerfile
      runAfter:
        - git-clone
      workspaces:
        - name: source
          workspace: shared-workspace
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: copy
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            securityContext:
              runAsUser: 0
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              CONTEXT="$(workspaces.source.path)/smart-log-analyzer/log-generator"
              cat > "${CONTEXT}/Dockerfile" << 'DOCKERFILE'
              FROM quay.io/mcarlett/camel-launcher:4.18.0

              USER root

              RUN curl -fsSL -o /opt/opentelemetry-javaagent.jar https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/latest/download/opentelemetry-javaagent.jar

              COPY log-generator.camel.yaml /routes/
              COPY application-dev.properties /routes/
              COPY agent.properties /opt/agent.properties

              RUN chmod -R a+r /opt/opentelemetry-javaagent.jar /opt/agent.properties /routes/

              USER ubuntu
              WORKDIR /tmp

              ENV HOME=/tmp
              ENV JAVA_OPTS="-javaagent:/opt/opentelemetry-javaagent.jar"
              ENV OTEL_JAVAAGENT_CONFIGURATION_FILE=/opt/agent.properties

              CMD ["run", "/routes/log-generator.camel.yaml", "/routes/application-dev.properties", "--dep=org.apache.camel:camel-opentelemetry2"]
              DOCKERFILE

              echo "Dockerfile written to ${CONTEXT}"
              ls -la "${CONTEXT}"

    - name: build-image
      runAfter:
        - copy-dockerfile
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: image-registry.openshift-image-registry.svc:5000/$(params.namespace)/log-generator:latest
        - name: DOCKERFILE
          value: Dockerfile
        - name: CONTEXT
          value: .
        - name: TLS_VERIFY
          value: "false"
      workspaces:
        - name: source
          workspace: shared-workspace
          subPath: smart-log-analyzer/log-generator

    - name: deploy
      runAfter:
        - build-image
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: openshift-client
          - name: namespace
            value: openshift-pipelines
      workspaces:
        - name: manifest_dir
          workspace: shared-workspace
      params:
        - name: SCRIPT
          value: |
            NS="$(params.namespace)"
            APP="log-generator"
            IMAGE="image-registry.openshift-image-registry.svc:5000/${NS}/${APP}:latest"
            OTEL_ENDPOINT="$(params.otel-collector-endpoint)"

            # Create deployment
            oc create deployment ${APP} \
              --image="${IMAGE}" \
              --replicas=0 \
              -n "${NS}" --dry-run=client -o yaml | oc apply -f -

            # Set OTel endpoint
            oc set env deployment/${APP} -n "${NS}" \
              OTEL_EXPORTER_OTLP_ENDPOINT="${OTEL_ENDPOINT}" \
              OTEL_EXPORTER_OTLP_PROTOCOL=grpc

            # Scale up
            oc scale deployment/${APP} -n "${NS}" --replicas=1
            oc rollout status deployment/${APP} -n "${NS}" --timeout=120s
            echo "Log generator deployed successfully."
