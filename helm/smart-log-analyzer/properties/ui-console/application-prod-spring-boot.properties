# Storage configuration
analyzer.storage.root=/tmp/analyzer-store

# JMS Queue configuration
camel.jms.queue.analysis-result=analysis-result

# Artemis JMS configuration for OpenShift (Spring Boot auto-configuration)
spring.artemis.broker-url=${ARTEMIS_BROKER_URL:tcp://artemis:61616}
spring.artemis.user=${AMQ_USERNAME}
spring.artemis.password=${AMQ_PASSWORD}
spring.artemis.pool.enabled=true
spring.artemis.pool.max-sessions-per-connection=500
spring.artemis.pool.idle-timeout=20000

# Camel configuration
camel.main.name=ui-console

# Micrometer metrics
camel.metrics.enabled=true
camel.metrics.enableRoutePolicy=true
camel.metrics.enableExchangeEventNotifier=true
camel.metrics.enableRouteEventNotifier=true
camel.metrics.binders=jvm-memory,jvm-gc,processor

# Management server (Prometheus scrape endpoint on port 9876)
camel.management.enabled=true
camel.management.metricsEnabled=true

# Infinispan stats (cache entry counts)
infra.infinispan.host=${INFINISPAN_HOSTS:infinispan:11222}
infra.infinispan.user=${DATAGRID_USERNAME}
infra.infinispan.password=${DATAGRID_PASSWORD}

# Prometheus proxy endpoints
infra.correlator.metrics.url=correlator:9876/observe/metrics
infra.analyzer.metrics.url=analyzer:9876/observe/metrics
infra.ui.metrics.url=ui-console:9876/observe/metrics
infra.analyzer.state.url=analyzer:8080/api/analyzer/state

# Spring Boot HTTP configuration
server.compression.enabled=true
