# Infinispan configuration for OpenShift
camel.component.infinispan.hosts=${INFINISPAN_HOSTS:infinispan:11222}
camel.component.infinispan.username=${DATAGRID_USERNAME}
camel.component.infinispan.password=${DATAGRID_PASSWORD}
camel.component.infinispan.sasl-mechanism=DIGEST-MD5
camel.component.infinispan.security-realm=default
camel.component.infinispan.security-server-name=infinispan
camel.component.infinispan.secure=true
# Hot Rod TLS configuration
camel.component.infinispan.configuration-properties[infinispan.client.hotrod.use_ssl]=true
camel.component.infinispan.configuration-properties[infinispan.client.hotrod.trust_store_file_name]=/var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt
camel.component.infinispan.configuration-properties[infinispan.client.hotrod.trust_store_type]=PEM
camel.component.infinispan.configuration-properties[infinispan.client.hotrod.sni_host_name]=infinispan.slog-analyzer.svc

# Artemis JMS configuration for OpenShift (Spring Boot auto-configuration)
spring.artemis.broker-url=${ARTEMIS_BROKER_URL:tcp://artemis:61616}
spring.artemis.user=${AMQ_USERNAME}
spring.artemis.password=${AMQ_PASSWORD}
spring.artemis.pool.enabled=true
spring.artemis.pool.max-sessions-per-connection=500
spring.artemis.pool.idle-timeout=20000
camel.jms.queue.error-logs=error-logs
camel.jms.queue.analysis-result=analysis-result

# REST configuration (status API)
server.port=8089
camel.rest.component=platform-http
camel.rest.binding-mode=off
camel.rest.port=8089
camel.rest.host=0.0.0.0

# Camel configuration
camel.main.name=analyzer

# Micrometer metrics
camel.metrics.enabled=true
camel.metrics.enableRoutePolicy=true
camel.metrics.enableExchangeEventNotifier=true
camel.metrics.enableRouteEventNotifier=true
camel.metrics.binders=jvm-memory,jvm-gc,processor

# Management server (Prometheus scrape endpoint)
camel.management.enabled=true
camel.management.metricsEnabled=true
camel.management.port=8081
