{{- range $name, $component := .Values.components }}
{{- if $component.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    app: {{ $name }}
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/part-of: smart-log-analyzer
spec:
  selector:
    app: {{ $name }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: management
      port: {{ if eq $.Values.runtime "spring-boot" }}9876{{ else }}8081{{ end }}
      targetPort: {{ if eq $.Values.runtime "spring-boot" }}9876{{ else }}8081{{ end }}
      protocol: TCP
{{- end }}
{{- end }}
