apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: build-and-deploy-run-
spec:
  pipelineRef:
    name: build-and-deploy
  params:
    - name: repo-url
      value: https://github.com/mcarlett/camel-jbang-examples.git
    - name: repo-revision
      value: tekton
    - name: app-path
      value: smart-log-analyzer/correlator
    - name: app-name
      value: correlator
    - name: namespace
      value: slog-analyzer
    - name: camel-image
      value: "quay.io/mcarlett/camel-launcher:4.18.0"
    - name: gav
      value: "com.example:correlator:1.0.0"
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: maven-repo
