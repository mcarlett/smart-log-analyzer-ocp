# Infinispan configuration for OpenShift
camel.component.infinispan.hosts=${INFINISPAN_HOSTS:infinispan:11222}
camel.component.infinispan.username={{hashicorp:secret:datagrid-username#value}}
camel.component.infinispan.password={{hashicorp:secret:datagrid-password#value}}
camel.component.infinispan.sasl-mechanism=DIGEST-MD5
camel.component.infinispan.security-realm=default
camel.component.infinispan.security-server-name=infinispan
camel.component.infinispan.secure=true
camel.component.infinispan.configuration-uri=file:///deployments/config/hotrod-client.properties

# Artemis JMS configuration for OpenShift (Spring Boot auto-configuration)
spring.artemis.broker-url=${ARTEMIS_BROKER_URL:tcp://artemis:61616}
spring.artemis.user={{hashicorp:secret:amq-username#value}}
spring.artemis.password={{hashicorp:secret:amq-password#value}}
spring.artemis.pool.enabled=true
spring.artemis.pool.max-sessions-per-connection=500
spring.artemis.pool.idle-timeout=20000
camel.jms.queue.error-logs=error-logs
camel.jms.queue.analysis-result=analysis-result

# Ollama configuration (OpenAI-compatible API)
camel.component.openai.apiKey=ollama
camel.component.openai.baseUrl=${OLLAMA_BASE_URL:http://ollama:11434/v1}
camel.component.openai.model=${OLLAMA_MODEL:granite4:3b}

# Camel configuration
camel.main.name=analyzer

# HashiCorp Vault configuration
camel.component.hashicorp-vault.early-resolve-properties=true
camel.vault.hashicorp.token=${HASHICORP_TOKEN}
camel.vault.hashicorp.host=${HASHICORP_HOST}
camel.vault.hashicorp.port=${HASHICORP_PORT}
camel.vault.hashicorp.scheme=http
