apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-and-deploy
spec:
  params:
    - name: repo-url
      type: string
      description: Git repository URL
      default: "https://github.com/apache/camel-jbang-examples.git"
    - name: repo-revision
      type: string
      description: Git revision (branch, tag, or commit SHA)
      default: main
    - name: app-path
      type: string
      description: Path within the repository to the Camel application
      default: smart-log-analyzer/correlator
    - name: app-name
      type: string
      description: Application name (used for image and deployment)
      default: correlator
    - name: namespace
      type: string
      description: Target namespace for deployment
      default: slog-analyzer
    - name: camel-image
      type: string
      description: Image containing the Camel CLI for export
      default: "quay.io/mcarlett/camel-launcher:4.18.0"
    - name: gav
      type: string
      description: Maven groupId:artifactId:version for the exported project
      default: "com.example:correlator:1.0.0"
    - name: config-repo-url
      type: string
      description: Git repository URL containing app-config
      default: "https://github.com/mcarlett/smart-log-analyzer-ocp.git"
    - name: config-repo-revision
      type: string
      description: Git revision for the config repository
      default: main

  workspaces:
    - name: shared-workspace
      description: Shared workspace for source code and build artifacts

  tasks:
    # Step 0: Initialize workspace permissions
    - name: init-workspace
      taskRef:
        name: init-workspace
      workspaces:
        - name: source
          workspace: shared-workspace

    # Step 1: Clone the repository
    - name: git-clone
      runAfter:
        - init-workspace
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.repo-url)
        - name: REVISION
          value: $(params.repo-revision)
        - name: DELETE_EXISTING
          value: "true"
        - name: SUBDIRECTORY
          value: repo
      workspaces:
        - name: output
          workspace: shared-workspace

    # Step 1b: Clone the config repository (parallel with git-clone)
    - name: git-clone-config
      runAfter:
        - init-workspace
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.config-repo-url)
        - name: REVISION
          value: $(params.config-repo-revision)
        - name: DELETE_EXISTING
          value: "true"
        - name: SUBDIRECTORY
          value: config
      workspaces:
        - name: output
          workspace: shared-workspace

    # Step 2: Fix workspace permissions after git-clone
    - name: fix-workspace
      runAfter:
        - git-clone
        - git-clone-config
      taskRef:
        name: init-workspace
      workspaces:
        - name: source
          workspace: shared-workspace

    # Step 3a: Create app-config ConfigMap from resolved properties file
    - name: create-app-config
      runAfter:
        - fix-workspace
      taskRef:
        name: create-app-config
      params:
        - name: app-name
          value: $(params.app-name)
        - name: app-path
          value: repo/$(params.app-path)
        - name: app-config-path
          value: config/resources/app-config
        - name: namespace
          value: $(params.namespace)
      workspaces:
        - name: source
          workspace: shared-workspace

    # Step 3b: Export Camel application to Quarkus project
    - name: camel-export
      runAfter:
        - fix-workspace
      taskRef:
        name: camel-export
      params:
        - name: app-path
          value: repo/$(params.app-path)
        - name: camel-image
          value: $(params.camel-image)
        - name: gav
          value: $(params.gav)
        - name: export-dir
          value: export
      workspaces:
        - name: source
          workspace: shared-workspace

    # Step 4: Add Quarkus extensions
    - name: add-quarkus-extension
      runAfter:
        - camel-export
      taskRef:
        name: add-quarkus-extension
      params:
        - name: extensions
          value: "org.apache.camel.quarkus:camel-quarkus-hashicorp-vault"
        - name: export-dir
          value: export
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-repo
          workspace: shared-workspace
          subPath: m2-settings

    # Step 5: Build Quarkus application with Maven
    - name: maven-build
      runAfter:
        - add-quarkus-extension
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: maven
          - name: namespace
            value: openshift-pipelines
      params:
        - name: GOALS
          value:
            - -Dmaven.repo.local=/workspace/maven_settings/repository
            - clean
            - package
        - name: SUBDIRECTORY
          value: export
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven_settings
          workspace: shared-workspace
          subPath: m2-settings

    # Step 5: Write Dockerfile from ConfigMap to workspace
    - name: prepare-dockerfile
      runAfter:
        - maven-build
      taskRef:
        name: prepare-dockerfile
      params:
        - name: export-dir
          value: export
      workspaces:
        - name: source
          workspace: shared-workspace

    # Step 5: Build container image with Buildah
    - name: build-image
      runAfter:
        - prepare-dockerfile
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: image-registry.openshift-image-registry.svc:5000/$(params.namespace)/$(params.app-name):latest
        - name: DOCKERFILE
          value: src/main/docker/Dockerfile.jvm
        - name: CONTEXT
          value: .
        - name: TLS_VERIFY
          value: "false"
      workspaces:
        - name: source
          workspace: shared-workspace
          subPath: export

    # Step 5: Deploy the application
    - name: deploy
      runAfter:
        - build-image
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: openshift-client
          - name: namespace
            value: openshift-pipelines
      params:
        - name: SCRIPT
          value: |
            APP="$(params.app-name)"
            NS="$(params.namespace)"
            IMAGE="image-registry.openshift-image-registry.svc:5000/${NS}/${APP}:latest"

            echo "Deploying ${APP} to namespace ${NS}..."
            oc create deployment "${APP}" \
              --image="${IMAGE}" \
              -n "${NS}" \
              --dry-run=client -o yaml | oc apply -n "${NS}" -f -

            oc set env deployment/"${APP}" -n "${NS}" \
              --from=configmap/infra-endpoints

            oc set env deployment/"${APP}" -n "${NS}" \
              --from=configmap/otel-infra-endpoints

            oc set env deployment/"${APP}" -n "${NS}" \
              --from=secret/vault-token

            # Workaround for Infinispan client 16.x Netty event loop incompatibility
            # (incompatible event loop type: NioEventLoop) with Quarkus 3.32.x
            oc set env deployment/"${APP}" -n "${NS}" \
              JAVA_OPTS_APPEND="-Dio.netty.transport.noNative=true"

            # Inject Data Grid credentials for the Quarkus Infinispan client extension,
            # which cannot resolve Camel vault placeholders (hashicorp:secret:*)
            oc patch deployment "${APP}" -n "${NS}" --type=json -p '[
              {"op":"add","path":"/spec/template/spec/containers/0/env/-","value":{"name":"DATAGRID_USERNAME","valueFrom":{"secretKeyRef":{"name":"infra-accounts","key":"datagrid-username"}}}},
              {"op":"add","path":"/spec/template/spec/containers/0/env/-","value":{"name":"DATAGRID_PASSWORD","valueFrom":{"secretKeyRef":{"name":"infra-accounts","key":"datagrid-password"}}}}
            ]'

            # Mount app-config ConfigMap as /deployments/config/application.properties
            oc set volume deployment/"${APP}" -n "${NS}" \
              --add --overwrite \
              --name=app-config \
              --type=configmap \
              --configmap-name="${APP}-config" \
              --mount-path=/deployments/config

            # Mount Strimzi Kafka cluster CA certificate
            oc set volume deployment/"${APP}" -n "${NS}" \
              --add --overwrite \
              --name=kafka-ca \
              --type=secret \
              --secret-name=kafka-cluster-ca \
              --mount-path=/etc/kafka-ca

            oc set resources deployment/"${APP}" -n "${NS}" \
              --limits=memory=2Gi

            oc rollout status deployment/"${APP}" -n "${NS}" --timeout=300s
            oc wait --for=condition=Available deployment/"${APP}" -n "${NS}" --timeout=300s
            echo "Deployment ${APP} is ready."
