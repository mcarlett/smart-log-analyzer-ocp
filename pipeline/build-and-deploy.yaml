apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-and-deploy
spec:
  params:
    - name: repo-url
      type: string
      description: Git repository URL
      default: "https://github.com/apache/camel-jbang-examples.git"
    - name: repo-revision
      type: string
      description: Git revision (branch, tag, or commit SHA)
      default: main
    - name: app-path
      type: string
      description: Path within the repository to the Camel application
      default: smart-log-analyzer/correlator
    - name: app-name
      type: string
      description: Application name (used for image and deployment)
      default: correlator
    - name: namespace
      type: string
      description: Target namespace for deployment
      default: slog-analyzer
    - name: camel-image
      type: string
      description: Image containing the Camel CLI for export
      default: "quay.io/mcarlett/camel-launcher:4.18.0"
    - name: gav
      type: string
      description: Maven groupId:artifactId:version for the exported project
      default: "com.example:correlator:1.0.0"
    - name: config-repo-url
      type: string
      description: Git repository URL containing app-config
      default: "https://github.com/mcarlett/smart-log-analyzer-ocp.git"
    - name: config-repo-revision
      type: string
      description: Git revision for the config repository
      default: main
    - name: runtime
      type: string
      description: "Target runtime for the camel export: quarkus or spring-boot"
      default: "quarkus"
    - name: runtime-version
      type: string
      description: "Runtime platform version (Quarkus or Spring Boot version). If empty, uses the default from camel export"
      default: ""
    - name: extensions
      type: string
      description: Comma-separated list of Quarkus extensions to add
      default: "org.apache.camel.quarkus:camel-quarkus-hashicorp-vault"
    - name: storage-mount-point
      type: string
      description: "Mount point for persistent storage. If set, creates a PVC named <app-name>-storage and mounts it at this path."
      default: ""
    - name: storage-size
      type: string
      description: Size of the persistent storage PVC
      default: "1Gi"
    - name: extra-env
      type: string
      description: "Comma-separated list of extra environment variables (key=value) to set on the deployment"
      default: ""
    - name: replicas
      type: string
      description: Number of replicas for the deployment
      default: "1"
    - name: expose
      type: string
      description: "If true, creates a Route to expose the deployment externally"
      default: "false"

  workspaces:
    - name: shared-workspace
      description: Shared workspace for source code and build artifacts

  tasks:
    # Step 0: Initialize workspace permissions
    - name: init-workspace
      taskRef:
        name: init-workspace
      workspaces:
        - name: source
          workspace: shared-workspace

    # Step 1: Clone the repository
    - name: git-clone
      runAfter:
        - init-workspace
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.repo-url)
        - name: REVISION
          value: $(params.repo-revision)
        - name: DELETE_EXISTING
          value: "true"
        - name: SUBDIRECTORY
          value: repo
      workspaces:
        - name: output
          workspace: shared-workspace

    # Step 1b: Clone the config repository (parallel with git-clone)
    - name: git-clone-config
      runAfter:
        - init-workspace
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.config-repo-url)
        - name: REVISION
          value: $(params.config-repo-revision)
        - name: DELETE_EXISTING
          value: "true"
        - name: SUBDIRECTORY
          value: config
      workspaces:
        - name: output
          workspace: shared-workspace

    # Step 2: Fix workspace permissions after git-clone
    - name: fix-workspace
      runAfter:
        - git-clone
        - git-clone-config
      taskRef:
        name: init-workspace
      workspaces:
        - name: source
          workspace: shared-workspace

    # Step 3a: Create app-config ConfigMap from resolved properties file
    - name: create-app-config
      runAfter:
        - fix-workspace
      taskRef:
        name: create-app-config
      params:
        - name: app-name
          value: $(params.app-name)
        - name: app-path
          value: repo/$(params.app-path)
        - name: app-config-path
          value: config/resources/app-config
        - name: runtime
          value: $(params.runtime)
        - name: namespace
          value: $(params.namespace)
      workspaces:
        - name: source
          workspace: shared-workspace

    # Step 3b: Export Camel application to target runtime (quarkus or spring-boot)
    - name: camel-export
      runAfter:
        - fix-workspace
      taskRef:
        name: camel-export
      params:
        - name: app-path
          value: repo/$(params.app-path)
        - name: camel-image
          value: $(params.camel-image)
        - name: gav
          value: $(params.gav)
        - name: runtime
          value: $(params.runtime)
        - name: runtime-version
          value: $(params.runtime-version)
        - name: export-dir
          value: export
      workspaces:
        - name: source
          workspace: shared-workspace

    # Step 4: Add Quarkus extensions (only for quarkus runtime)
    - name: add-quarkus-extension
      when:
        - input: "$(params.runtime)"
          operator: in
          values: ["quarkus"]
      runAfter:
        - camel-export
      taskRef:
        name: add-quarkus-extension
      params:
        - name: extensions
          value: "$(params.extensions)"
        - name: export-dir
          value: export
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-repo
          workspace: shared-workspace
          subPath: m2-settings

    # Step 4b: Fix workspace permissions after export/extensions
    - name: fix-export-permissions
      runAfter:
        - add-quarkus-extension
        - camel-export
      workspaces:
        - name: source
          workspace: shared-workspace
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: fix-permissions
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            securityContext:
              runAsUser: 0
            script: |
              #!/usr/bin/env bash
              chown -R 65532:0 $(workspaces.source.path)/export
              chown -R 65532:0 $(workspaces.source.path)/m2-settings 2>/dev/null || true

    # Step 5: Build application with Maven
    - name: maven-build
      runAfter:
        - fix-export-permissions
      workspaces:
        - name: source
          workspace: shared-workspace
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: maven-goals
            image: registry.access.redhat.com/ubi9/openjdk-21:latest
            workingDir: $(workspaces.source.path)/export
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              ./mvnw -Dmaven.repo.local=$(workspaces.source.path)/m2-settings/repository clean package
            securityContext:
              runAsUser: 0

    # Step 5: Write Dockerfile from ConfigMap to workspace
    - name: prepare-dockerfile
      runAfter:
        - maven-build
      taskRef:
        name: prepare-dockerfile
      params:
        - name: export-dir
          value: export
        - name: runtime
          value: $(params.runtime)
      workspaces:
        - name: source
          workspace: shared-workspace

    # Step 5: Build container image with Buildah
    - name: build-image
      runAfter:
        - prepare-dockerfile
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: image-registry.openshift-image-registry.svc:5000/$(params.namespace)/$(params.app-name):latest
        - name: DOCKERFILE
          value: src/main/docker/Dockerfile.jvm
        - name: CONTEXT
          value: .
        - name: TLS_VERIFY
          value: "false"
      workspaces:
        - name: source
          workspace: shared-workspace
          subPath: export

    # Step 5: Deploy the application
    - name: deploy
      runAfter:
        - build-image
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: openshift-client
          - name: namespace
            value: openshift-pipelines
      params:
        - name: SCRIPT
          value: |
            APP="$(params.app-name)"
            NS="$(params.namespace)"
            IMAGE="image-registry.openshift-image-registry.svc:5000/${NS}/${APP}:latest"

            echo "Deploying ${APP} to namespace ${NS}..."
            oc create deployment "${APP}" \
              --image="${IMAGE}" \
              --replicas=0 \
              -n "${NS}" \
              --dry-run=client -o yaml | oc apply -n "${NS}" -f -

            oc set env deployment/"${APP}" -n "${NS}" \
              --from=configmap/infra-endpoints

            oc set env deployment/"${APP}" -n "${NS}" \
              --from=configmap/otel-infra-endpoints

            oc set env deployment/"${APP}" -n "${NS}" \
              --from=secret/vault-token

            # Workaround for Infinispan client 16.x Netty event loop incompatibility
            # (incompatible event loop type: NioEventLoop) with Quarkus 3.32.x
            oc set env deployment/"${APP}" -n "${NS}" \
              JAVA_OPTS_APPEND="-Dio.netty.transport.noNative=true"

            # Inject Data Grid credentials for the Quarkus Infinispan client extension,
            # which cannot resolve Camel vault placeholders (hashicorp:secret:*)
            oc set env deployment/"${APP}" -n "${NS}" \
              DATAGRID_USERNAME- DATAGRID_PASSWORD- AMQ_USERNAME- AMQ_PASSWORD-

            oc patch deployment "${APP}" -n "${NS}" --type=json -p '[
              {"op":"add","path":"/spec/template/spec/containers/0/env/-","value":{"name":"DATAGRID_USERNAME","valueFrom":{"secretKeyRef":{"name":"infra-accounts","key":"datagrid-username"}}}},
              {"op":"add","path":"/spec/template/spec/containers/0/env/-","value":{"name":"DATAGRID_PASSWORD","valueFrom":{"secretKeyRef":{"name":"infra-accounts","key":"datagrid-password"}}}},
              {"op":"add","path":"/spec/template/spec/containers/0/env/-","value":{"name":"AMQ_USERNAME","valueFrom":{"secretKeyRef":{"name":"infra-accounts","key":"amq-username"}}}},
              {"op":"add","path":"/spec/template/spec/containers/0/env/-","value":{"name":"AMQ_PASSWORD","valueFrom":{"secretKeyRef":{"name":"infra-accounts","key":"amq-password"}}}}
            ]'

            # Mount app-config ConfigMap as /deployments/config/application.properties
            oc set volume deployment/"${APP}" -n "${NS}" \
              --add --overwrite \
              --name=app-config \
              --type=configmap \
              --configmap-name="${APP}-config" \
              --mount-path=/deployments/config

            # Mount Strimzi Kafka cluster CA certificate
            oc set volume deployment/"${APP}" -n "${NS}" \
              --add --overwrite \
              --name=kafka-ca \
              --type=secret \
              --secret-name=kafka-cluster-ca \
              --mount-path=/etc/kafka-ca

            oc set resources deployment/"${APP}" -n "${NS}" \
              --limits=memory=2Gi

            # Create and mount persistent storage if storage-mount-point is set
            STORAGE_MOUNT="$(params.storage-mount-point)"
            if [ -n "${STORAGE_MOUNT}" ]; then
              STORAGE_SIZE="$(params.storage-size)"
              PVC_NAME="${APP}-storage"

              cat <<PVCEOF | oc apply -n "${NS}" -f -
            apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              name: ${PVC_NAME}
              namespace: ${NS}
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: ${STORAGE_SIZE}
            PVCEOF

              oc set volume deployment/"${APP}" -n "${NS}" \
                --add --overwrite \
                --name=app-storage \
                --type=persistentVolumeClaim \
                --claim-name="${PVC_NAME}" \
                --mount-path="${STORAGE_MOUNT}"
            fi

            # Set extra environment variables if provided
            EXTRA_ENV="$(params.extra-env)"
            if [ -n "${EXTRA_ENV}" ]; then
              IFS=',' read -ra PAIRS <<< "${EXTRA_ENV}"
              oc set env deployment/"${APP}" -n "${NS}" "${PAIRS[@]}"
            fi

            # Expose the deployment via a Route if requested
            EXPOSE="$(params.expose)"
            if [ "${EXPOSE}" = "true" ]; then
              oc expose deployment/"${APP}" -n "${NS}" --port=8080
              oc expose svc/"${APP}" -n "${NS}"
              ROUTE_HOST=$(oc get route "${APP}" -n "${NS}" -o jsonpath='{.spec.host}')
              echo "Route created: http://${ROUTE_HOST}"
            fi

            # Scale up and wait for rollout
            oc scale deployment/"${APP}" -n "${NS}" --replicas=$(params.replicas)
            oc rollout status deployment/"${APP}" -n "${NS}" --timeout=300s
            oc wait --for=condition=Available deployment/"${APP}" -n "${NS}" --timeout=300s
            echo "Deployment ${APP} is ready."
