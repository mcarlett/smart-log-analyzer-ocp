apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: deploy-smart-log-analyzer
spec:
  params:
    - name: repo-url
      type: string
      description: Git repository URL
      default: "https://github.com/apache/camel-jbang-examples.git"
    - name: repo-revision
      type: string
      description: Git revision (branch, tag, or commit SHA)
      default: main
    - name: namespace
      type: string
      description: Target namespace for deployment
      default: slog-analyzer
    - name: camel-image
      type: string
      description: Image containing the Camel CLI for export
      default: "quay.io/mcarlett/camel-launcher:4.18.0"
    - name: config-repo-url
      type: string
      description: Git repository URL containing app-config
      default: "https://github.com/mcarlett/smart-log-analyzer-ocp.git"
    - name: config-repo-revision
      type: string
      description: Git revision for the config repository
      default: main

  tasks:
    - name: check-prerequisites
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: openshift-client
          - name: namespace
            value: openshift-pipelines
      params:
        - name: SCRIPT
          value: |
            NS="$(params.namespace)"
            echo "Checking prerequisites..."

            if ! oc get secret kafka-cluster-ca -n "${NS}" > /dev/null 2>&1; then
              echo "ERROR: Secret 'kafka-cluster-ca' not found in namespace ${NS}."
              echo "Create it before running this pipeline. See README.md prerequisites."
              echo ""
              echo "Example:"
              echo "  oc get secret camel-cluster-cluster-ca-cert -n camel-otel-infra -o jsonpath='{.data.ca\\.crt}' | base64 -d > /tmp/ca.crt"
              echo "  oc create secret generic kafka-cluster-ca --from-file=ca.crt=/tmp/ca.crt -n ${NS}"
              exit 1
            fi

            echo "All prerequisites met."

    - name: deploy-correlator
      runAfter:
        - check-prerequisites
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: openshift-client
          - name: namespace
            value: openshift-pipelines
      params:
        - name: SCRIPT
          value: |
            NS="$(params.namespace)"

            cat <<EOF | oc create -f -
            apiVersion: tekton.dev/v1
            kind: PipelineRun
            metadata:
              generateName: build-correlator-
              namespace: ${NS}
            spec:
              pipelineRef:
                name: build-and-deploy
              params:
                - name: repo-url
                  value: "$(params.repo-url)"
                - name: repo-revision
                  value: "$(params.repo-revision)"
                - name: app-path
                  value: smart-log-analyzer/correlator
                - name: app-name
                  value: correlator
                - name: namespace
                  value: ${NS}
                - name: camel-image
                  value: "$(params.camel-image)"
                - name: gav
                  value: "com.example:correlator:1.0.0"
                - name: config-repo-url
                  value: "$(params.config-repo-url)"
                - name: config-repo-revision
                  value: "$(params.config-repo-revision)"
                - name: extensions
                  value: "org.apache.camel.quarkus:camel-quarkus-hashicorp-vault"
              workspaces:
                - name: shared-workspace
                  volumeClaimTemplate:
                    spec:
                      accessModes:
                        - ReadWriteOnce
                      resources:
                        requests:
                          storage: 1Gi
            EOF

            echo "Waiting for correlator build-and-deploy to complete..."
            RUN=$(oc get pipelinerun -n "${NS}" --sort-by=.metadata.creationTimestamp -o name | grep build-correlator | tail -1)
            oc wait "${RUN}" -n "${NS}" --for=condition=Succeeded --timeout=1800s
            echo "Correlator deployed successfully."

    - name: deploy-analyzer
      runAfter:
        - check-prerequisites
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: openshift-client
          - name: namespace
            value: openshift-pipelines
      params:
        - name: SCRIPT
          value: |
            NS="$(params.namespace)"

            cat <<EOF | oc create -f -
            apiVersion: tekton.dev/v1
            kind: PipelineRun
            metadata:
              generateName: build-analyzer-
              namespace: ${NS}
            spec:
              pipelineRef:
                name: build-and-deploy
              params:
                - name: repo-url
                  value: "$(params.repo-url)"
                - name: repo-revision
                  value: "$(params.repo-revision)"
                - name: app-path
                  value: smart-log-analyzer/analyzer
                - name: app-name
                  value: analyzer
                - name: namespace
                  value: ${NS}
                - name: camel-image
                  value: "$(params.camel-image)"
                - name: gav
                  value: "com.example:analyzer:1.0.0"
                - name: config-repo-url
                  value: "$(params.config-repo-url)"
                - name: config-repo-revision
                  value: "$(params.config-repo-revision)"
                - name: extensions
                  value: "org.apache.camel.quarkus:camel-quarkus-hashicorp-vault"
              workspaces:
                - name: shared-workspace
                  volumeClaimTemplate:
                    spec:
                      accessModes:
                        - ReadWriteOnce
                      resources:
                        requests:
                          storage: 1Gi
            EOF

            echo "Waiting for analyzer build-and-deploy to complete..."
            RUN=$(oc get pipelinerun -n "${NS}" --sort-by=.metadata.creationTimestamp -o name | grep build-analyzer | tail -1)
            oc wait "${RUN}" -n "${NS}" --for=condition=Succeeded --timeout=1800s
            echo "Analyzer deployed successfully."

    - name: deploy-ui-console
      runAfter:
        - check-prerequisites
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: openshift-client
          - name: namespace
            value: openshift-pipelines
      params:
        - name: SCRIPT
          value: |
            NS="$(params.namespace)"

            cat <<EOF | oc create -f -
            apiVersion: tekton.dev/v1
            kind: PipelineRun
            metadata:
              generateName: build-ui-console-
              namespace: ${NS}
            spec:
              pipelineRef:
                name: build-and-deploy
              params:
                - name: repo-url
                  value: "$(params.repo-url)"
                - name: repo-revision
                  value: "$(params.repo-revision)"
                - name: app-path
                  value: smart-log-analyzer/ui-console
                - name: app-name
                  value: ui-console
                - name: namespace
                  value: ${NS}
                - name: camel-image
                  value: "$(params.camel-image)"
                - name: gav
                  value: "com.example:ui-console:1.0.0"
                - name: config-repo-url
                  value: "$(params.config-repo-url)"
                - name: config-repo-revision
                  value: "$(params.config-repo-revision)"
                - name: extensions
                  value: "org.apache.camel.quarkus:camel-quarkus-hashicorp-vault,org.apache.camel.quarkus:camel-quarkus-platform-http"
              workspaces:
                - name: shared-workspace
                  volumeClaimTemplate:
                    spec:
                      accessModes:
                        - ReadWriteOnce
                      resources:
                        requests:
                          storage: 1Gi
            EOF

            echo "Waiting for ui-console build-and-deploy to complete..."
            RUN=$(oc get pipelinerun -n "${NS}" --sort-by=.metadata.creationTimestamp -o name | grep build-ui-console | tail -1)
            oc wait "${RUN}" -n "${NS}" --for=condition=Succeeded --timeout=1800s
            echo "UI Console deployed successfully."
