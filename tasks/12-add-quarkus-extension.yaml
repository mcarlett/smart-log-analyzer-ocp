apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: add-quarkus-extension
spec:
  params:
    - name: extensions
      type: string
      description: Comma-separated list of Quarkus extensions to add
    - name: export-dir
      type: string
      default: export
      description: Directory containing the exported Quarkus project
  workspaces:
    - name: source
      description: Workspace containing the exported project
    - name: maven-repo
      description: Persistent Maven repository cache
  steps:
    - name: add-extension
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      securityContext:
        runAsUser: 0
      workingDir: $(workspaces.source.path)/$(params.export-dir)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        microdnf install -y java-21-openjdk-headless && microdnf clean all

        echo "Adding Quarkus extensions: $(params.extensions)"
        ./mvnw quarkus:add-extension \
          -Dextensions="$(params.extensions)" \
          -Dmaven.repo.local="$(workspaces.maven-repo.path)/repository"
        echo "Extensions added successfully."

        # Fix ownership so subsequent tasks (maven) can write to workspace
        chown -R 65532:0 "$(workspaces.source.path)/$(params.export-dir)"
        chown -R 65532:0 "$(workspaces.maven-repo.path)/repository"
