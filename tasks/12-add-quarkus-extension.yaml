apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: add-quarkus-extension
spec:
  params:
    - name: extensions
      type: string
      description: Comma-separated list of Quarkus extensions to add
    - name: export-dir
      type: string
      default: export
      description: Directory containing the exported Quarkus project
  workspaces:
    - name: source
      description: Workspace containing the exported project
  steps:
    - name: add-extension
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      securityContext:
        runAsUser: 0
      workingDir: $(workspaces.source.path)/$(params.export-dir)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        microdnf install -y java-21-openjdk-headless && microdnf clean all

        echo "Adding Quarkus extensions: $(params.extensions)"
        ./mvnw quarkus:add-extension \
          -Dextensions="$(params.extensions)"
        echo "Extensions added successfully."
