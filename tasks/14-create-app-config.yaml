apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: create-app-config
spec:
  params:
    - name: app-name
      type: string
      description: Application name (used for ConfigMap naming)
    - name: app-path
      type: string
      description: Path within the workspace to the Camel application sources
    - name: app-config-path
      type: string
      default: ""
      description: Path within the workspace to the app-config directory (e.g. config/resources/app-config)
    - name: runtime
      type: string
      default: "quarkus"
      description: "Target runtime: quarkus or spring-boot"
    - name: namespace
      type: string
      default: slog-analyzer
      description: Target namespace
  workspaces:
    - name: source
      description: Workspace containing the cloned repositories
  steps:
    - name: create-configmap
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        APP_NAME="$(params.app-name)"
        NS="$(params.namespace)"
        APP_CONFIG_PATH="$(params.app-config-path)"
        SRC_DIR="$(workspaces.source.path)/$(params.app-path)"
        PROPS_FILE=""

        RUNTIME="$(params.runtime)"

        # Resolve properties file: application-prod-<runtime>.properties > application-prod.properties > application-dev.properties > application.properties
        if [ -n "${APP_CONFIG_PATH}" ]; then
          CANDIDATE="$(workspaces.source.path)/${APP_CONFIG_PATH}/${APP_NAME}/application-prod-${RUNTIME}.properties"
          if [ -f "${CANDIDATE}" ]; then
            PROPS_FILE="${CANDIDATE}"
            echo "Using ${CANDIDATE}"
          else
            CANDIDATE="$(workspaces.source.path)/${APP_CONFIG_PATH}/${APP_NAME}/application-prod.properties"
            if [ -f "${CANDIDATE}" ]; then
              PROPS_FILE="${CANDIDATE}"
              echo "Using ${CANDIDATE}"
            fi
          fi
        fi

        if [ -z "${PROPS_FILE}" ] && [ -f "${SRC_DIR}/application-dev.properties" ]; then
          PROPS_FILE="${SRC_DIR}/application-dev.properties"
          echo "Using ${PROPS_FILE}"
        fi

        if [ -z "${PROPS_FILE}" ] && [ -f "${SRC_DIR}/application.properties" ]; then
          PROPS_FILE="${SRC_DIR}/application.properties"
          echo "Using ${PROPS_FILE}"
        fi

        if [ -z "${PROPS_FILE}" ]; then
          echo "No properties file found, skipping ConfigMap creation."
          exit 0
        fi

        echo "Creating ConfigMap ${APP_NAME}-config in namespace ${NS}..."
        oc create configmap "${APP_NAME}-config" \
          --from-file=application.properties="${PROPS_FILE}" \
          -n "${NS}" \
          --dry-run=client -o yaml | oc apply -n "${NS}" -f -

        echo "ConfigMap ${APP_NAME}-config created:"
        oc get configmap "${APP_NAME}-config" -n "${NS}" -o yaml
