apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: dispatch-builds
spec:
  params:
    - name: repo-url
      type: string
      description: Git repository URL (from webhook)
    - name: repo-revision
      type: string
      description: Git commit SHA after push
    - name: before
      type: string
      description: Git commit SHA before push
    - name: runtime
      type: string
      default: "spring-boot"
      description: "Target runtime: quarkus or spring-boot"
    - name: config-repo-url
      type: string
      default: "https://github.com/mcarlett/smart-log-analyzer-ocp.git"
      description: Git repository URL containing app-config
    - name: config-repo-revision
      type: string
      default: main
      description: Git revision for the config repository
    - name: camel-image
      type: string
      default: "quay.io/mcarlett/camel-launcher:4.18.0"
      description: Image containing the Camel CLI for export
  steps:
    - name: dispatch
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      env:
        - name: REPO_URL
          value: $(params.repo-url)
        - name: REPO_REVISION
          value: $(params.repo-revision)
        - name: BEFORE
          value: $(params.before)
        - name: RUNTIME
          value: $(params.runtime)
        - name: CONFIG_REPO_URL
          value: $(params.config-repo-url)
        - name: CONFIG_REPO_REVISION
          value: $(params.config-repo-revision)
        - name: CAMEL_IMAGE
          value: $(params.camel-image)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)

        echo "Push received: ${BEFORE}..${REPO_REVISION}"
        echo "Repository: ${REPO_URL}"

        # Extract owner/repo from URL for GitHub API
        GITHUB_PATH=$(echo "${REPO_URL}" | sed 's|.*github.com/||; s|\.git$||')
        API="https://api.github.com/repos/${GITHUB_PATH}"

        # Get changed files using GitHub Compare API
        echo "Fetching diff ${BEFORE}...${REPO_REVISION}..."
        CHANGED_FILES=$(curl -sf "${API}/compare/${BEFORE}...${REPO_REVISION}" | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        for f in data.get('files', []):
            print(f['filename'])
        ")
        echo "Changed files:"
        echo "${CHANGED_FILES}"

        # Determine which components need rebuilding
        BUILD_CORRELATOR=false
        BUILD_ANALYZER=false
        BUILD_UI_CONSOLE=false

        echo "${CHANGED_FILES}" | grep -q '^smart-log-analyzer/correlator/' && BUILD_CORRELATOR=true || true
        echo "${CHANGED_FILES}" | grep -q '^smart-log-analyzer/analyzer/' && BUILD_ANALYZER=true || true
        echo "${CHANGED_FILES}" | grep -q '^smart-log-analyzer/ui-console/' && BUILD_UI_CONSOLE=true || true

        echo ""
        echo "Components to rebuild: correlator=${BUILD_CORRELATOR} analyzer=${BUILD_ANALYZER} ui-console=${BUILD_UI_CONSOLE}"

        if [ "${BUILD_CORRELATOR}" = "false" ] && [ "${BUILD_ANALYZER}" = "false" ] && [ "${BUILD_UI_CONSOLE}" = "false" ]; then
          echo "No smart-log-analyzer components changed. Nothing to do."
          exit 0
        fi

        # Helper function to create a PipelineRun
        create_pipeline_run() {
          local APP_NAME="$1"
          local APP_PATH="$2"
          local GAV="$3"
          local EXTRA_PARAMS="${4:-}"

          echo "Creating PipelineRun for ${APP_NAME}..."
          cat <<PEOF | oc create -f -
        apiVersion: tekton.dev/v1
        kind: PipelineRun
        metadata:
          generateName: build-${APP_NAME}-
          namespace: ${NS}
        spec:
          pipelineRef:
            name: build-and-deploy
          params:
            - name: repo-url
              value: "${REPO_URL}"
            - name: repo-revision
              value: "${REPO_REVISION}"
            - name: app-path
              value: "${APP_PATH}"
            - name: app-name
              value: "${APP_NAME}"
            - name: namespace
              value: "${NS}"
            - name: camel-image
              value: "${CAMEL_IMAGE}"
            - name: gav
              value: "${GAV}"
            - name: config-repo-url
              value: "${CONFIG_REPO_URL}"
            - name: config-repo-revision
              value: "${CONFIG_REPO_REVISION}"
            - name: extensions
              value: "org.apache.camel.quarkus:camel-quarkus-hashicorp-vault"
            - name: deps
              value: "org.apache.camel.springboot:camel-hashicorp-vault-starter"
            - name: runtime
              value: "${RUNTIME}"
        ${EXTRA_PARAMS}
          workspaces:
            - name: shared-workspace
              volumeClaimTemplate:
                spec:
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 1Gi
        PEOF
        }

        if [ "${BUILD_CORRELATOR}" = "true" ]; then
          create_pipeline_run "correlator" "smart-log-analyzer/correlator" "com.example:correlator:1.0.0"
        fi

        if [ "${BUILD_ANALYZER}" = "true" ]; then
          ANALYZER_EXTRA='            - name: env-secret
              value: "openai-config"'
          create_pipeline_run "analyzer" "smart-log-analyzer/analyzer" "com.example:analyzer:1.0.0" "${ANALYZER_EXTRA}"
        fi

        if [ "${BUILD_UI_CONSOLE}" = "true" ]; then
          UI_EXTRA='            - name: storage-mount-point
              value: "/storage"
            - name: extra-env
              value: "ANALYZER_STORAGE_ROOT=/storage"
            - name: expose
              value: "true"
            - name: deployment-strategy
              value: "Recreate"
            - name: extensions
              value: "org.apache.camel.quarkus:camel-quarkus-hashicorp-vault,org.apache.camel.quarkus:camel-quarkus-platform-http"'
          create_pipeline_run "ui-console" "smart-log-analyzer/ui-console" "com.example:ui-console:1.0.0" "${UI_EXTRA}"
        fi

        echo "Done. PipelineRuns created for changed components."
