apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: prepare-dockerfile
spec:
  params:
    - name: export-dir
      type: string
      default: export
      description: Path within the workspace to the exported project
    - name: dockerfile-path
      type: string
      default: src/main/docker/Dockerfile.jvm
      description: Destination path for the Dockerfile relative to export-dir
  workspaces:
    - name: source
      description: Workspace containing the exported project
  steps:
    - name: write-dockerfile
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      volumeMounts:
        - name: base-image-config
          mountPath: /config
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        DEST="$(workspaces.source.path)/$(params.export-dir)/$(params.dockerfile-path)"
        mkdir -p "$(dirname "${DEST}")"
        cp /config/Dockerfile "${DEST}"
        echo "Dockerfile written to ${DEST}"
        cat "${DEST}"
  stepTemplate:
    volumeMounts: []
  sidecars: []
  volumes:
    - name: base-image-config
      configMap:
        name: base-image-config
