apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-amq-broker
spec:
  params:
    - name: name
      type: string
      default: artemis
      description: Name of the ActiveMQArtemis instance
    - name: namespace
      type: string
      description: Target namespace
    - name: resources-path
      type: string
      default: resources/amq-broker
      description: Path within the workspace to the AMQ Broker resource files
  workspaces:
    - name: source
      description: Workspace containing the resource files
  steps:
    - name: deploy
      image: quay.io/openshift/origin-cli:latest
      env:
        - name: AMQ_USERNAME
          valueFrom:
            secretKeyRef:
              name: infra-accounts
              key: amq-username
        - name: AMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: infra-accounts
              key: amq-password
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        NAME="$(params.name)"
        NS="$(params.namespace)"
        RESOURCES="$(workspaces.source.path)/$(params.resources-path)"

        echo "Deploying ActiveMQArtemis ${NAME} in namespace ${NS}..."

        # Apply the CR from the external file, injecting credentials
        sed -e "s/name: artemis/name: ${NAME}/" "${RESOURCES}/artemis.yaml" | \
          oc apply -n "${NS}" -f -

        # Patch credentials from the secret
        oc patch activemqartemis "${NAME}" -n "${NS}" --type merge \
          -p "{\"spec\":{\"adminUser\":\"${AMQ_USERNAME}\",\"adminPassword\":\"${AMQ_PASSWORD}\"}}"

        echo "Waiting for ActiveMQArtemis ${NAME} to be ready..."
        for i in $(seq 1 60); do
          READY=$(oc get activemqartemis "${NAME}" -n "${NS}" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
          if [ "${READY}" = "True" ]; then
            echo "ActiveMQArtemis ${NAME} is ready."
            exit 0
          fi
          PODS_READY=$(oc get pods -n "${NS}" -l ActiveMQArtemis="${NAME}" -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
          if [ "${PODS_READY}" = "True" ]; then
            echo "ActiveMQArtemis ${NAME} pod is ready."
            exit 0
          fi
          echo "  Waiting... (${i}/60)"
          sleep 5
        done

        echo "ERROR: ActiveMQArtemis ${NAME} did not become ready in time."
        exit 1
