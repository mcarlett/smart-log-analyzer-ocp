apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: camel-export
spec:
  params:
    - name: app-path
      type: string
      description: Path within the repository to the Camel application to export
    - name: camel-image
      type: string
      default: "quay.io/mcarlett/camel-launcher:4.18.0"
      description: Image containing the Camel CLI
    - name: gav
      type: string
      default: "com.example:camel-app:1.0.0"
      description: Maven groupId:artifactId:version for the exported project
    - name: export-dir
      type: string
      default: "export"
      description: Output directory for the exported Quarkus project
    - name: app-config-path
      type: string
      default: ""
      description: Path within the workspace to the app-config directory (e.g. repo/resources/app-config)
  workspaces:
    - name: source
      description: Workspace containing the cloned repository
  steps:
    - name: export
      image: $(params.camel-image)
      workingDir: $(workspaces.source.path)/$(params.app-path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        EXPORT_DIR="$(workspaces.source.path)/$(params.export-dir)"

        APP_NAME=$(basename "$(params.app-path)")
        APP_CONFIG_PATH="$(params.app-config-path)"
        APP_DIR="$(workspaces.source.path)/$(params.app-path)"
        PROFILE_OPT=""

        if [ -n "${APP_CONFIG_PATH}" ]; then
          PROD_PROPS="$(workspaces.source.path)/${APP_CONFIG_PATH}/${APP_NAME}/application-prod.properties"
          if [ -f "${PROD_PROPS}" ]; then
            echo "Copying production config to app folder..."
            cp "${PROD_PROPS}" "${APP_DIR}/application-prod.properties"
            PROFILE_OPT="--profile=prod"
          else
            echo "No production config found at ${PROD_PROPS}, skipping."
          fi
        fi

        echo "Exporting Camel application from $(params.app-path) to Quarkus..."
        echo "Output directory: ${EXPORT_DIR}"
        echo "GAV: $(params.gav)"

        camel export \
          --runtime=quarkus \
          --gav="$(params.gav)" \
          --fresh \
          --dir="${EXPORT_DIR}" \
          ${PROFILE_OPT}

        echo "Export completed. Contents of ${EXPORT_DIR}:"
        ls -la "${EXPORT_DIR}"

        chmod -R 777 "${EXPORT_DIR}"
