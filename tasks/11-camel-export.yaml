apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: camel-export
spec:
  params:
    - name: app-path
      type: string
      description: Path within the repository to the Camel application to export
    - name: camel-image
      type: string
      default: "quay.io/mcarlett/camel-launcher:4.18.0"
      description: Image containing the Camel CLI
    - name: gav
      type: string
      default: "com.example:camel-app:1.0.0"
      description: Maven groupId:artifactId:version for the exported project
    - name: export-dir
      type: string
      default: "export"
      description: Output directory for the exported Quarkus project
  workspaces:
    - name: source
      description: Workspace containing the cloned repository
  steps:
    - name: export
      image: $(params.camel-image)
      workingDir: $(workspaces.source.path)/$(params.app-path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        EXPORT_DIR="$(workspaces.source.path)/$(params.export-dir)"

        echo "Exporting Camel application from $(params.app-path) to Quarkus..."
        echo "Output directory: ${EXPORT_DIR}"
        echo "GAV: $(params.gav)"

        camel export \
          --runtime=quarkus \
          --gav="$(params.gav)" \
          --fresh \
          --dir="${EXPORT_DIR}"

        echo "Export completed. Contents of ${EXPORT_DIR}:"
        ls -la "${EXPORT_DIR}"

        APP_PROPS="${EXPORT_DIR}/src/main/resources/application.properties"
        SRC_DIR="$(workspaces.source.path)/$(params.app-path)"

        for PROPS_FILE in application.properties application-dev.properties; do
          if [ -f "${SRC_DIR}/${PROPS_FILE}" ]; then
            echo "Found ${PROPS_FILE} in source, appending to exported application.properties..."
            echo "" >> "${APP_PROPS}"
            echo "# From ${PROPS_FILE}" >> "${APP_PROPS}"
            cat "${SRC_DIR}/${PROPS_FILE}" >> "${APP_PROPS}"
          fi
        done

        chmod -R 777 "${EXPORT_DIR}"
