apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: install-operator
spec:
  params:
    - name: name
      type: string
      description: Operator package name
    - name: channel
      type: string
      description: Subscription channel
    - name: namespace
      type: string
      description: Namespace to install the operator in
    - name: source
      type: string
      default: redhat-operators
      description: CatalogSource name
  steps:
    - name: install
      image: quay.io/openshift/origin-cli:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        NAME="$(params.name)"
        CHANNEL="$(params.channel)"
        NS="$(params.namespace)"
        SOURCE="$(params.source)"

        echo "Installing operator ${NAME} (channel: ${CHANNEL}) in namespace ${NS}..."

        cat <<EOF | oc apply -f -
        apiVersion: operators.coreos.com/v1alpha1
        kind: Subscription
        metadata:
          name: ${NAME}
          namespace: ${NS}
        spec:
          channel: "${CHANNEL}"
          name: ${NAME}
          source: ${SOURCE}
          sourceNamespace: openshift-marketplace
          installPlanApproval: Automatic
        EOF

        echo "Waiting for operator ${NAME} to be ready..."
        for i in $(seq 1 60); do
          CSV=$(oc get subscription "${NAME}" -n "${NS}" -o jsonpath='{.status.installedCSV}' 2>/dev/null || true)
          if [ -n "${CSV}" ]; then
            PHASE=$(oc get csv "${CSV}" -n "${NS}" -o jsonpath='{.status.phase}' 2>/dev/null || true)
            if [ "${PHASE}" = "Succeeded" ]; then
              echo "Operator ${NAME} (${CSV}) is ready."
              exit 0
            fi
            echo "  CSV ${CSV} phase: ${PHASE}"
          fi
          sleep 5
        done

        echo "ERROR: Operator ${NAME} did not become ready in time."
        exit 1
