apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: create-infra-endpoints
spec:
  params:
    - name: namespace
      type: string
      description: Target namespace
    - name: amq-name
      type: string
      default: artemis
      description: Name of the ActiveMQArtemis instance
    - name: infinispan-name
      type: string
      default: infinispan
      description: Name of the Infinispan cluster
  steps:
    - name: create-configmap
      image: quay.io/openshift/origin-cli:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        NS="$(params.namespace)"
        AMQ="$(params.amq-name)"
        ISPN="$(params.infinispan-name)"

        ISPN_HOST="${ISPN}.${NS}.svc"
        ISPN_PORT="11222"
        VAULT_HOST="vault.${NS}.svc"
        VAULT_PORT="8200"

        echo "Creating ConfigMap infra-endpoints in namespace ${NS}..."

        oc create configmap infra-endpoints \
          -n "${NS}" \
          --from-literal=ARTEMIS_BROKER_URL="tcp://${AMQ}-hdls-svc.${NS}.svc:61616" \
          --from-literal=INFINISPAN_HOSTS="${ISPN_HOST}:${ISPN_PORT}" \
          --from-literal=HASHICORP_HOST="${VAULT_HOST}" \
          --from-literal=HASHICORP_PORT="${VAULT_PORT}" \
          --dry-run=client -o yaml | oc apply -n "${NS}" -f -

        echo "ConfigMap infra-endpoints created:"
        oc get configmap infra-endpoints -n "${NS}" -o yaml
